<div class="auth-wrapper">
  <div class="auth-bg">
    <div class="auth-orb orb-1"></div>
    <div class="auth-orb orb-2"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="pokeball-mini">
        <div class="pb-top"></div>
        <div class="pb-bottom"></div>
        <div class="pb-band"><div class="pb-btn"></div></div>
      </div>
      <h1 class="auth-title">Pokémon TCG</h1>
    </div>

    <h2 class="auth-subtitle">Crear Cuenta</h2>

    @if (error()) {
      <div class="auth-error">⚠️ {{ error() }}</div>
    }

    @if (success()) {
      <div class="auth-success">✅ {{ success() }}</div>
    }

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Nombre de Entrenador</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="AshKetchum"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@email.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Mínimo 6 caracteres"
          autocomplete="new-password"
          required
        />
      </div>

      <div class="form-group">
        <label for="confirm">Confirmar Contraseña</label>
        <input
          id="confirm"
          type="password"
          [(ngModel)]="confirm"
          name="confirm"
          placeholder="Repite tu contraseña"
          autocomplete="new-password"
          required
        />
      </div>

      <button type="submit" class="auth-btn" [disabled]="loading()">
        @if (loading()) {
          <span class="btn-spinner"></span> Creando cuenta...
        } @else {
          🎮 Crear Cuenta
        }
      </button>
    </form>

    <p class="auth-link">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</div>
